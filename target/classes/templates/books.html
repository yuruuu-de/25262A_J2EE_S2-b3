<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Danh sách sách</title>
</head>
<body>
    <div layout:fragment="content">
        <h1 class="mb-4">Danh sách sách</h1>
        <a th:href="@{/add}" class="btn btn-success mb-3">Thêm sách mới</a>

        <div class="table-responsive">
            <table class="table table-striped table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Tiêu đề</th>
                        <th>Tác giả</th>
                        <th class="text-end">Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(books)}">
                        <td colspan="4" class="text-muted fst-italic">Chưa có sách nào.</td>
                    </tr>
                    <tr th:each="book : ${books}">
                        <td th:text="${book.id}"></td>
                        <td th:text="${book.title}"></td>
                        <td th:text="${book.author}"></td>
                        <td class="text-end">
                            <a th:href="@{/edit/{id}(id=${book.id})}" class="btn btn-sm btn-outline-primary me-1">Sửa</a>
                            <a th:href="@{/delete/{id}(id=${book.id})}" class="btn btn-sm btn-outline-danger"
                               onclick="return confirm('Bạn có chắc muốn xóa sách này?');">Xóa</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
